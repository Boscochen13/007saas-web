<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>007SaaS | 利用云解决方案赋能企业</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-cloud { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans overflow-hidden">
    <div class="relative min-h-screen flex flex-col items-center justify-center p-4">
        <!-- 背景装饰 -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
            <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-600/20 rounded-full blur-[100px]"></div>
            <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-purple-600/20 rounded-full blur-[100px]"></div>
        </div>

        <!-- 标志 -->
        <div class="mb-8 text-3xl font-bold tracking-tighter flex items-center gap-2">
            <span class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">007SAAS</span>
            <div class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></div>
        </div>

        <!-- 主体内容 -->
        <div class="text-center max-w-2xl">
            <div class="mb-6 flex justify-center">
                <svg class="w-32 h-32 text-blue-400 float-cloud" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 tracking-tight">
                利用云解决方案赋能企业
            </h1>
            <p class="text-slate-400 text-lg md:text-xl mb-10 leading-relaxed">
                我们正在打造下一代智能 SaaS 平台。
                <br>让技术更有温度，让连接无处不在。
            </p>

            <!-- 状态 -->
            <div class="inline-flex items-center px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm font-medium text-blue-300">
                <span class="relative flex h-3 w-3 mr-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                正在紧锣密鼓地筹备中...
            </div>
        </div>

        <!-- 底部联系 -->
        <footer class="absolute bottom-10 text-slate-500 text-sm">
            &copy; 2025 007SaaS. Built with Love for CCX-52.
        </footer>
    </div>
</body>
</html>
